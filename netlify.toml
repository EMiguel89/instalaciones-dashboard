[build]
  command = "echo 'Building...'"
  functions = "netlify/functions"
  publish = "."

[dev]
  command = "echo 'Ready for development'"
  functions = "netlify/functions"
  publish = "."
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
